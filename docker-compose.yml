services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow-server
    depends_on:
      - postgres
    environment:
      PORT: 5000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taskflow?schema=public
      JWT_SECRET: taskflow-super-secret
      JWT_REFRESH_SECRET: taskflow-refresh-secret
      CLIENT_URL: http://localhost:5173
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow-client
    depends_on:
      - server
    ports:
      - '5173:5173'

volumes:
  postgres_data:
